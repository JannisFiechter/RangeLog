{% extends "base.html" %}
{% block title %}Settings{% endblock %}
{% block content %}
<section class="section">
  <h1>Settings</h1>
  <div class="grid stats-grid">
    <article class="metric"><span>{{ counts.exercises }}</span><small>Übungen</small></article>
    <article class="metric"><span>{{ counts.runs }}</span><small>Runs</small></article>
    <article class="metric"><span>1.0</span><small>Version</small></article>
  </div>
</section>

<section class="section">
  <h2>Darstellung</h2>
  <div class="form-card">
    <label class="check-line theme-toggle">
      <input type="checkbox" id="themeToggle">
      Dark Mode
    </label>
  </div>
</section>

<section class="section">
  <h2>App</h2>
  <form action="{{ url_for('main.api_seed_defaults') }}" method="post">
    <button class="primary-action full" type="submit">Standardübungen neu anlegen</button>
  </form>
  <a class="secondary-action full" href="{{ url_for('auth.logout') }}">Logout</a>
</section>

<section class="section">
  <h2>Account</h2>
  <div class="settings-actions">
    <form class="form-card" action="{{ url_for('auth.change_email') }}" method="post">
      <label>E-Mail
        <input type="email" name="email" value="{{ current_user.email or '' }}" placeholder="optional">
      </label>
      <button class="secondary-action full" type="submit">E-Mail speichern</button>
    </form>

    <form class="form-card" action="{{ url_for('auth.change_password') }}" method="post">
      <label>Aktuelles Passwort
        <input type="password" name="current_password" autocomplete="current-password" required>
      </label>
      <label>Neues Passwort
        <input type="password" name="new_password" autocomplete="new-password" required>
      </label>
      <button class="secondary-action full" type="submit">Passwort ändern</button>
    </form>
  </div>

  <form action="{{ url_for('auth.delete_account') }}" method="post" onsubmit="return confirm('Dein Account und alle deine Übungen und Runs werden gelöscht. Diese Aktion kann nicht rückgängig gemacht werden.');">
    <button class="danger-action" type="submit">Account löschen</button>
  </form>
</section>
{% endblock %}
